name: Tinfoil Container Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: tinfoil-container-build-and-release

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if version tag already exists
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=sha,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.version }}

  release:
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      actions: write

    steps:
      - name: Update tinfoil-config.yml and create tag
        uses: tinfoilsh/update-container-action@a9d308f86a2257f31cba1c43540bdd3b53d30b3b # v0.4.0
        with:
          image: ghcr.io/${{ github.repository }}
          version: ${{ inputs.version }}
          digest: ${{ needs.docker-build.outputs.digest }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-branch: ${{ github.ref_name }}

      - name: Trigger Tinfoil Container Release action
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh workflow run tinfoil-release.yml --ref "$VERSION"
