shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.5
cpus: 8
memory: 16384

containers:
  - name: "websearch-mcp"
    image: "ghcr.io/tinfoilsh/confidential-websearch@sha256:8cec6fb4316b56c2273b4d1f443f3fa4fde0e4dc7071e1fdc52ca4a26c330266" # v0.3.3
    env:
      - SAFEGUARD_MODEL: "gpt-oss-safeguard-120b"
    secrets:
      - EXA_API_KEY
      - TINFOIL_API_KEY
      - CLOUDFLARE_ACCOUNT_ID
      - CLOUDFLARE_API_TOKEN

shim:
  listen-port: 443
  upstream-port: 8089
  authenticated: true
  authenticated-endpoints:
    - /mcp
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /mcp
    - /v1/chat/completions
    - /v1/responses
    - /health
