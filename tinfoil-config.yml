shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.5
cpus: 8
memory: 16384

containers:
  - name: "websearch-mcp"
    image: "ghcr.io/tinfoilsh/confidential-websearch@sha256:c2be9efe37399416a58cf1d8e09de671266380a94b8d692b21a0528a8d89159d" # v0.5.0
    env:
      - SAFEGUARD_MODEL: "gpt-oss-safeguard-120b"
      - CONTROL_PLANE_URL: "https://api.tinfoil.sh"
      - USAGE_REPORTER_ID: "websearch-mcp"
    secrets:
      - EXA_API_KEY
      - CLOUDFLARE_API_TOKEN
      - TINFOIL_API_KEY
      - USAGE_REPORTER_SECRET

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /mcp
    - /health
  authenticated: true
  authenticated-endpoints:
    - /mcp
