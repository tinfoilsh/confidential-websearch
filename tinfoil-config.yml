shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.5
cpus: 8
memory: 16384

containers:
  - name: "websearch-mcp"
    image: "ghcr.io/tinfoilsh/confidential-websearch@sha256:faaf8eb04a0466a24eb797391f5086f4483d272dcccddd04793617ad714e32da" # 0.3.1
    env:
      - SAFEGUARD_MODEL: "gpt-oss-safeguard-120b"
    secrets:
      - EXA_API_KEY
      - TINFOIL_API_KEY
      - CLOUDFLARE_ACCOUNT_ID
      - CLOUDFLARE_API_TOKEN

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /mcp
    - /v1/chat/completions
    - /v1/responses
    - /health
