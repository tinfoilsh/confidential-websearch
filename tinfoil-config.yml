shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.1
cpus: 8
memory: 16384

containers:
  - name: "websearch-mcp"
    image: "ghcr.io/tinfoilsh/confidential-websearch@sha256:5b5d388f2a962c46bb5abe175f8ba27e11408861178f1d069bb33499623406b0"
    env:
      - SAFEGUARD_MODEL: "gpt-oss-safeguard-120b"
    secrets:
      - EXA_API_KEY
      - TINFOIL_API_KEY
      - CLOUDFLARE_ACCOUNT_ID
      - CLOUDFLARE_API_TOKEN

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /mcp
    - /v1/chat/completions
    - /v1/responses
    - /health
