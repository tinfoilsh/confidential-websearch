shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.1
cpus: 8
memory: 16384

containers:
  - name: "websearch-proxy"
    image: "ghcr.io/tinfoilsh/confidential-websearch:0.2.8"
    env:
      - AGENT_MODEL: "gpt-oss-120b"
      - SAFEGUARD_MODEL: "gpt-oss-safeguard-120b"
    secrets:
      - EXA_API_KEY
      - TINFOIL_API_KEY
      - CLOUDFLARE_ACCOUNT_ID
      - CLOUDFLARE_API_TOKEN

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /v1/chat/completions
    - /v1/responses
    - /health
